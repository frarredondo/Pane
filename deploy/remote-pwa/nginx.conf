server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index remote.html;

  server_tokens off;

  gzip on;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    text/css
    text/javascript
    text/plain;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /healthz {
    access_log off;
    add_header Content-Type "text/plain; charset=utf-8";
    return 200 "ok\n";
  }

  location = / {
    return 308 /app/;
  }

  location = /app {
    return 308 /app/;
  }

  location = /remote.html {
    return 308 /app/;
  }

  location ~ ^/app/assets/(.*)$ {
    rewrite ^/app/(.*)$ /$1 break;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location /app/ {
    rewrite ^/app/(.*)$ /$1 break;
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /remote.html;
  }
}
